patch:
  key_binder/tips_key: "Break"
  key_binder/bindings/+: # 也可以再增加方案专有的
    - { when: always, toggle: chinese_english, accept: Control+e } # 切换翻译功能
    - { when: always, toggle: super_tips, accept: Control+t } # 切换超级提示
    - { when: always, toggle: s2s, accept: Control+Shift+4 } #
    - { when: always, toggle: abbrev_lazy, accept: Control+q } # 切换简码模式

  super_comment/cand_type:
    user_phrase: "📌" # 自造词
    sentence: "💬" # 模型造句
    phrase: "🏷" # 字典词库
    table: "🗂" # 表
    user_table: "📝" # custom_phrase
    completion: "♾️" # 补全
    abbrev: "🚀" # 简码
    derived: "💡" # 派生
    fallback: "❗"

  # 开关
  # reset: 默认状态。注释掉后，切换窗口时不会重置到默认状态。
  # states: 方案选单显示的名称。可以注释掉，仍可以通过快捷键切换。
  # abbrev: 默认的缩写取 states 的第一个字符，abbrev 可自定义一个字符
  switches:
    - name: ascii_mode # 中英输入状态
      states: [中文, 英文]
    - name: ascii_punct # 中英标点，可以在中文输入状态输入英文符号
      states: [中标, 英标]
    - name: full_shape #全角、半角字符输出
      states: [半角, 全角]
    - name: emoji #候选出现emoji滤镜，会显示在相应的候选后面，万象侧重于tips提示，避免候选被占用，因此默认为reset: 0，归属opencc emoji滤镜
      states: [表情关, 表情开]
    - name: chinese_english #候选进入翻译模式滤镜，会显示在相应的候选后面，万象侧重于tips提示，避免候选被占用，归属opencc 翻译滤镜
      states: [翻译关, 翻译开]
      reset: 0
    - options: [s2s, s2t, s2hk, s2tw] # 简繁转换开关组，可以在一个空选项和多个实际“- simplifier@s2hk”引入的项目之前切换，这是一个开关组，你可以将其中任意一个s2s等设置为toggle快捷键，多次按下将轮询
      states: [简体, 通繁, 港繁, 臺繁]
      reset: 0
    - name: tone_hint #开启后在候选的注释里面实时显示全拼声调，不开启则采用系统配置，影响的是comment_format，归属：super_comment.lua
      states: [读音关, 读音开]
    - name: super_tips #开启后在输入编码后面的提示区显示实时的提示数据，受tips数据库影响，表情、翻译、车牌、符号等对应关系数据，并可实现句号上屏，不开启则默认，影响的是segment.prompt参数，归属：super_tips.lua
      states: [提示关, 提示开]
      reset: 1
    - name: abbrev
      states: [简码关, 简码开]
      reset: 1

  super_replacer:
    db_name: lua/replacer
    delimiter: "|"
    comment_format: "〔%s〕"
    chain: true #true表示流水线作业，上一个option产出交给下一个处理，典型的s2t>t2hk=s2hk，false就是并行，直接用text转换
    types:
      # 场景1：输入 '哈哈' -> 变成 '1.哈哈 2.😄'
      - option: emoji # 开关名称与上面开关名称保持一致
        mode: append # 新增候选append 替换原候选replace 替换注释comment 简码模式abbrev匹配输入编码置顶词组
        comment_mode: none # 注释模式: "append"(原候选注释继承), "text"(原候选文本放在注释), "none"(空，默认)
        tags: [abc] # 生效的tag
        prefix: "_em_" # 前缀用于区分同一个数据库的不同用途数据
        files:
          - lua/data/emoji.txt
      # 场景2：输入 'hello' -> 显示 'hello 〔你好 | 哈喽〕'
      - option: chinese_english
        mode: append # <--- 添加注释模式
        comment_mode: none
        tags: [abc]
        prefix: "_en_"
        files:
          - lua/data/english_chinese.txt
          - lua/data/chinese_english.txt
      # 场景3：用于常驻的直接替换 option: true
      - option: true
        mode: append # <--- 新增候选模式
        comment_mode: none
        tags: [abc]
        prefix: "_ot_"
        files:
          - lua/data/others.txt
      # 场景4：用于简繁转换的直接替换
      - option: [s2t, s2hk, s2tw] #后面依赖这条流水线有一个开关为true这条流水线就能工作
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2t_"
        files:
          - lua/data/STCharacters.txt
          - lua/data/STPhrases.txt
      - option: s2hk
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2hk_"
        files:
          - lua/data/HKVariants.txt
      - option: s2tw
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2tw_"
        files:
          - lua/data/TWVariants.txt
      - option: abbrev # 对应上面开关名称
        mode: abbrev
        prefix: "_abbr_"
        abbrev_rule: "1,6"
        # 前置数量1，前置位置6,数量说的是你维护得数据库编码后面分割了几个词前几个要前置显示,位置说的是你要前置到第二候选还是第几
        # 然后空码或只有英文等自定义词组的时候直接全部兜底显示,这个新的设计简化的应用层面,我们只需要维护一个数据库即可.
        files:
          - lua/data/t9_abbrev.txt # 格式：zm\t怎么|在吗
