patch:
  t9/isDisplayOriginalPreedit: false # false避免显示数字

  key_binder/bindings/+: # 也可以再增加方案专有的
    - { when: always, toggle: chinese_english, accept: Control+e } # 切换翻译功能
    - { when: always, toggle: super_tips, accept: Control+t } # 切换超级提示
    - { when: always, toggle: s2s, accept: Control+Shift+4 } #
    - { when: always, toggle: abbrev, accept: Control+q } # 切换简码模式

  super_comment/cand_type:
    user_phrase: "📌" # 自造词
    sentence: "☁️" # 模型造句
    phrase: "🏷" # 字典词库
    table: "🗂" # 表
    user_table: "📝" # custom_phrase
    completion: "♾️" # 补全
    abbrev: "🚀" # 简码
    derived: "💡" # 派生
    fallback: "❗"

  user_predict:
    db_name: lua/predict # 数据库名称（默认 predict，将生成 predict.userdb 文件夹）
    enable_post_predict: true # 上屏后预测
    enable_context_reorder: true # 输入时调频
    max_candidates: 10 # 屏幕最多显示的联想词数量
    max_predictions: 3 # 连续触发预测的最高次数限制
    expiry_days: 90 # 绝对寿命（天）：不命中则物理销毁
    activation_days: 7 # 激活期限（天）：冷冻期内输入第2次转正
    max_memory_branches: 15 # 分支上限：单前缀最多保留15个后续预测
    decay_rate: 0.85 # 衰减率：单日时间权重打 85 折
    enable_predict_space: false # true: 联想时按空格上屏空格; false: 默认行为（根据输入法设定选词等）一般手机开电脑关，这里有个布尔转换，空格当空格时其他按键打断，空格当上屏则，其他按键当作空格，有：Tab、Alt、右键、\斜杠
    context_timeout: 5000 # 上文超时时间毫秒
    custom_classifiers: # 数字后量词调频，如平时chuan传，输入数字后，首选为串，结果如：1串，想关闭清空列表即可
      - 个只名位口头匹条群批伙 # 人物动物
      - 张把件台部块根颗粒滴片朵面扇顶栋座所辆艘架盏支枝杆 # 物品建筑
      - 双对副套打串束排阵堆叠摞扎 # 成组集合
      - 杯瓶盒包份碗锅盆桶袋罐盘 # 包装容器
      - 次场局回趟顿番遍声项宗桩款步招 # 动作事件
      - 年月天周岁秒分刻代期届任夜季 # 时间周期
      - 本册篇首句段卷幅节堂门帖字行 # 文化作品
      - 米寸尺里斤两吨克升元角毛笔百千万亿 # 度量货币

  # 开关
  # reset: 默认状态。注释掉后，切换窗口时不会重置到默认状态。
  # states: 方案选单显示的名称。可以注释掉，仍可以通过快捷键切换。
  # abbrev: 默认的缩写取 states 的第一个字符，abbrev 可自定义一个字符
  switches/@0/reset: 0 # 默认中文状态
  switches/@4/reset: 0 # 默认翻译关闭
  switches/@5/reset: 0 # 默认大字集
  switches/@6/reset: 1 # 默认开启预测
  switches/@7/reset: 2 # 默认无声调
  switches/@8/reset: 0 # 默认简体中文
  switches/@9/reset: 2 # 对于9键，仓、元书用这个参数选择拼音，所以固定为无声调输出
  switches/@10/reset: 1 # 默认提示开
  switches/@11/reset: 1 # 默认简码开

  super_replacer:
    db_name: lua/replacer
    delimiter: "|"
    comment_format: "〔%s〕"
    chain: true #true表示流水线作业，上一个option产出交给下一个处理，典型的s2t>t2hk=s2hk，false就是并行，直接用text转换
    rules:
      # 场景1：输入 '哈哈' -> 变成 '1.哈哈 2.😄'
      - option: emoji # 开关名称与上面开关名称保持一致
        mode: append # 新增候选append 替换原候选replace 替换注释comment 简码模式abbrev匹配输入编码置顶词组
        comment_mode: none # 注释模式: "append"(原候选注释继承), "text"(原候选文本放在注释), "none"(空，默认)
        tags: [abc] # 生效的tag
        prefix: "_em_" # 前缀用于区分同一个数据库的不同用途数据
        files:
          - lua/data/emoji.txt
      # 场景2：输入 'hello' -> 显示 'hello 〔你好 | 哈喽〕'
      - option: chinese_english
        mode: append # <--- 添加注释模式
        comment_mode: none
        tags: [abc]
        prefix: "_en_"
        files:
          - lua/data/english_chinese.txt
          - lua/data/chinese_english.txt
      # 场景3：用于常驻的直接替换 option: true
      - option: true
        mode: append # <--- 新增候选模式
        comment_mode: none
        tags: [abc]
        prefix: "_ot_"
        files:
          - lua/data/others.txt
      # 场景4：用于简繁转换的直接替换
      - option: [s2t, s2hk, s2tw] #后面依赖这条流水线有一个开关为true这条流水线就能工作
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2t_"
        files:
          - lua/data/STCharacters.txt
          - lua/data/STPhrases.txt
      - option: s2hk
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2hk_"
        files:
          - lua/data/HKVariants.txt
      - option: s2tw
        mode: replace # <--- 替换原候选模式
        comment_mode: append
        sentence: true # <--- 句子级别替换
        tags: [abc]
        prefix: "_s2tw_"
        files:
          - lua/data/TWVariants.txt
      - option: true
        mode: abbrev
        abbrev_rule: "6,1"
        tags: [abc]
        prefix: "_t9c_"
        t9_optimization: true
        #conv: "abcdefghijklmnopqrstuvwxyz>22233344455566677778889999"
        files:
          - lua/data/custom_phrase_t9.txt
      - option: abbrev # 对应上面开关名称
        mode: abbrev
        prefix: "_abbr_"
        abbrev_rule: "1,6"
        # 前置数量1，前置位置6,数量说的是你维护得数据库编码后面分割了几个词前几个要前置显示,位置说的是你要前置到第二候选还是第几
        # 然后空码或只有英文等自定义词组的时候直接全部兜底显示,这个新的设计简化的应用层面,我们只需要维护一个数据库即可.
        files:
          - lua/data/t9_abbrev.txt # 格式：zm\t怎么|在吗

  super_processor:
    enable_backspace_limit: true # 开启/关闭退格限制
    enable_seg_loop: true # 开启/关闭分词符（'）循环
    enable_tone_fallback: true # 启用声调回退
    enable_predict_space: false # 启用联想空格打断，直接上屏空格并清空联想，对齐大厂，如果用原生librime-predict这个还有用留着
    kp_number_mode: auto # 小键盘模式 (auto / compose)
    limit_repeated: "8,40" #格式："最大重复声母数,最大候选字数"
    select_character: "[,]" # 开启以词定字，自动拆解第一位上屏首字，第二位上屏尾字
    # 下面这些写法都支持：
    # select_character: "[,]"                      # [ 上屏首字，] 上屏尾字（推荐）
    # select_character: "bracketleft, bracketright"  # [ 上屏首字，] 上屏尾字（英文全拼）

  super_tips:
    db_name: "lua/tips" # 可选字段，不写的话默认使用 "lua/tips"，相对路径
    tips_key: "Break" # key英文单词不清楚去default找
    files: # 自定义数据文件列表（可选，不配置则使用默认文件）
      - lua/data/tips_show.txt # 仍可保留默认文件
      #- lua/data/my_tips.txt     # 用户自定义文件
    disabled_types:
      - "禁用类型A"
      - "禁用类型B"
      # 禁用的 tips 类型，初始化 tips 数据库的时候会直接忽略相关规则，修改部署后生效
      # 可选项为：偏旁，符号，化学式，时间，符号，组字，翻译，表情，货币，车牌, 单位
